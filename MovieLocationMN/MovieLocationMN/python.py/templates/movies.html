{% extends "base.html" %}
{% block content %}
<h2>Movies</h2>

<div class="card">
  <h3>Adauga film</h3>
  <form method="post" action="{{ url_for('movies_add') }}" class="row">
    <input name="nume" placeholder="Nume film" required>
    <input name="durata" placeholder="Durata (minute)" required>
    <button type="submit">Adauga</button>
  </form>
</div>

<div class="card">
  <h3>Lista filme</h3>
  <table>
    <thead>
      <tr><th>ID</th><th>Nume</th><th>Durata</th></tr>
    </thead>
    <tbody>
      {% for m in movies %}
      <tr>
        <td>{{ m.idfilm }}</td>
        <td>{{ m.Nume }}</td>
        <td>{{ m.durata }}</td>
        <td class="actions">
          <a class="btn" href="{{ url_for('movies_edit', idfilm=m.idfilm) }}">Edit</a>
          <form method="post" action="{{ url_for('movies_delete', idfilm=m.idfilm) }}" onsubmit="return confirm('Stergi filmul?')">
            <button class="btn danger" type="submit">Delete</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="4">Niciun film.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
